<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="本月蕾丝图案精选与图案匹配服务">
  <meta name="theme-color" content="#f3efe7">
  <title>{% block title %}蕾智创库 · 蕾丝图案精选{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ static_url('images/favicon.svg') }}">
  <link rel="stylesheet" href="{{ static_url('css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}" aria-label="返回首页">
      <img class="brand-logo" src="{{ static_url('images/logo.svg') }}" alt="" width="54" height="54">
      <span class="brand-wordmark"><strong>蕾智创库</strong><small>LACE DESIGN WORKBENCH</small></span>
    </a>
    <nav class="site-nav" aria-label="主导航">
      <a href="{{ url_for('index') }}" {% if request.path == '/' %}class="is-active"{% endif %}>设计工作台</a>
      <a href="{{ url_for('library_page') }}" {% if request.path == '/library' %}class="is-active"{% endif %}>本店素材库</a>
      <a href="{{ url_for('index') }}#recognition">图案匹配</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">
    <span>蕾智创库 · 蕾丝设计参考库</span>
    <span>以纹理连接灵感与成衣</span>
  </footer>
  <script src="{{ static_url('js/app.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
